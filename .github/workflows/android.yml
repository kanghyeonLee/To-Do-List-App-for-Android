# ================================================================
# Android CI/CD — ToDoList
# ================================================================
#
# 트리거 전략:
#   main 브랜치 push / PR  →  Job 1: Debug APK 빌드
#   v* 태그 push           →  Job 2: Release APK 서명 + GitHub Release 게시
#                          →  Job 3: AI 기반 README.md 릴리즈 노트 자동 업데이트
#
# 필요한 GitHub Secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64   : base64 인코딩된 .jks 키스토어 파일 전체 내용
#   KEY_ALIAS         : 키스토어 안의 키 alias 이름
#   KEY_PASSWORD      : 키(key) 비밀번호
#   STORE_PASSWORD    : 키스토어(store) 비밀번호
#   LLM_API_KEY       : OpenAI 또는 Gemini API 키
#
# 선택적 GitHub Variables (Settings → Variables → Actions):
#   LLM_PROVIDER      : 'openai' 또는 'gemini' (미설정 시 기본값: gemini)
# ================================================================

name: Android CI/CD

on:
  push:
    branches: [ "main" ]
    tags:     [ "v*" ]
  pull_request:
    branches: [ "main" ]

# 동일 브랜치/태그에 중복 실행 중인 워크플로우는 자동 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ────────────────────────────────────────────────────────────────
# Job 1 · Debug Build  (main 브랜치 push / PR)
# ────────────────────────────────────────────────────────────────
jobs:
  build-debug:
    name: "Build Debug APK"
    # v* 태그 push 시에는 실행하지 않음
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin) + Gradle cache
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Job 2 · Release Build → Sign → GitHub Release 게시  (v* 태그)
  # ──────────────────────────────────────────────────────────────
  release:
    name: "Build, Sign & Publish Release APK"
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write   # GitHub Release 생성 + 자산 업로드에 필요

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin) + Gradle cache
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      # ── APK 서명 ─────────────────────────────────────────────
      - name: Sign APK with apksigner
        run: |
          # 1) Base64 Secret → 키스토어 파일 복원
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

          # 2) 설치된 Build-tools 중 가장 최신 버전 경로를 자동 탐지
          BUILD_TOOLS_DIR=$(ls -d "${ANDROID_SDK_ROOT}/build-tools"/* | sort -V | tail -1)
          APKSIGNER="${BUILD_TOOLS_DIR}/apksigner"

          # 3) Gradle이 생성한 unsigned APK 경로 자동 탐색
          UNSIGNED_APK=$(find app/build/outputs/apk/release \
            \( -name "*-unsigned.apk" -o -name "*.apk" \) | head -1)

          # 4) 릴리즈 APK 최종 저장 경로 (태그 버전명 포함)
          TAG="${{ github.ref_name }}"
          SIGNED_APK="app/build/outputs/apk/release/ToDoList-${TAG}.apk"

          # 5) apksigner 서명 실행
          "${APKSIGNER}" sign \
            --ks            keystore.jks \
            --ks-key-alias  "${{ secrets.KEY_ALIAS }}" \
            --ks-pass       "pass:${{ secrets.STORE_PASSWORD }}" \
            --key-pass      "pass:${{ secrets.KEY_PASSWORD }}" \
            --out           "${SIGNED_APK}" \
            "${UNSIGNED_APK}"

          # 6) 서명 검증
          "${APKSIGNER}" verify --verbose "${SIGNED_APK}"

          # 7) 키스토어 즉시 제거 (보안)
          rm -f keystore.jks

          # 8) 이후 step에서 참조할 환경 변수 등록
          echo "SIGNED_APK=${SIGNED_APK}" >> "${GITHUB_ENV}"
          echo "TAG=${TAG}"               >> "${GITHUB_ENV}"

      # ── GitHub Release 생성 + 서명된 APK 자산 첨부 ───────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ env.TAG }}"
          generate_release_notes: true
          files: ${{ env.SIGNED_APK }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Job 3 · AI 기반 README.md 릴리즈 노트 자동 업데이트
  #         release Job 성공 후에만 실행
  # ──────────────────────────────────────────────────────────────
  update-readme:
    name: "AI Release Notes → README"
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # ── Step 1: main 브랜치 전체 이력 체크아웃 ──────────────────
      #   fetch-depth: 0  →  전체 커밋 이력 + 모든 태그 필요
      - name: Checkout main branch (full history)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # ── Step 2: 이전 태그 탐색 ───────────────────────────────
      - name: Resolve previous tag
        id: tags
        run: |
          CURRENT_TAG="${{ github.ref_name }}"

          # 버전 순(version:refname) 정렬 후, 현재 태그 바로 앞 항목 추출
          PREV_TAG=$(
            git tag --sort=version:refname \
              | grep -E '^v[0-9]+\.[0-9]+' \
              | grep -B1 "^${CURRENT_TAG}$" \
              | grep -v  "^${CURRENT_TAG}$" \
              | tail -1
          )

          # 이전 태그가 없으면 저장소 최초 커밋을 기점으로 사용
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
            echo "이전 태그 없음 — 최초 커밋 사용: $PREV_TAG"
          else
            echo "이전 태그: $PREV_TAG"
          fi

          echo "current_tag=${CURRENT_TAG}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${PREV_TAG}"   >> "$GITHUB_OUTPUT"

      # ── Step 3: 두 태그 사이 커밋 메시지 추출 ───────────────
      - name: Extract commit messages
        run: |
          PREV="${{ steps.tags.outputs.previous_tag }}"
          CURR="${{ steps.tags.outputs.current_tag }}"

          git log "${PREV}..${CURR}" \
            --pretty=format:"%s" \
            --no-merges \
            > /tmp/commits.txt

          echo "=== Commits (${PREV} → ${CURR}) ==="
          cat /tmp/commits.txt

          # 커밋이 없을 경우 안전 처리
          if [ ! -s /tmp/commits.txt ]; then
            echo "변경사항 없음" > /tmp/commits.txt
          fi

      # ── Step 4: Python 환경 준비 ─────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Step 5: AI API 호출 → 릴리즈 노트 생성 ──────────────
      #   LLM_API_KEY  : GitHub Secret
      #   LLM_PROVIDER : GitHub Variable ('openai' | 'gemini', 기본 gemini)
      - name: Generate AI release notes
        env:
          LLM_API_KEY:  ${{ secrets.LLM_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          CURRENT_TAG:  ${{ steps.tags.outputs.current_tag }}
        run: |
          python3 << 'PYEOF'
import os, json, sys, urllib.request, urllib.error
from datetime import datetime, timezone

api_key  = os.environ["LLM_API_KEY"]
provider = (os.environ.get("LLM_PROVIDER") or "gemini").strip().lower()
tag      = os.environ["CURRENT_TAG"]

with open("/tmp/commits.txt", encoding="utf-8") as f:
    commits = f.read().strip()

# ── 프롬프트 ──────────────────────────────────────────────────
PROMPT = f"""당신은 안드로이드 앱 릴리즈 노트 작성 전문가입니다.
아래 git 커밋 메시지들을 분석하여 한국어로 사용자 친화적인 릴리즈 노트를 작성해 주세요.

[커밋 메시지]
{commits}

[출력 형식] — 해당 항목이 없는 섹션은 생략하세요.
### 🚀 새로운 기능
- 항목

### 🐛 버그 수정
- 항목

### 🛠️ 개선 사항
- 항목

### 📦 기타 변경
- 항목

규칙:
- 각 항목은 간결하고 사용자 관점에서 이해하기 쉽게 작성
- 기술적 세부사항보다 기능 변화에 초점
- 출력은 섹션 헤더(### ...)와 항목(-)만으로 구성
- 추가 설명문, 인사말, 전후 문단 없이 바로 출력"""


def call_openai(prompt: str, key: str) -> str:
    url     = "https://api.openai.com/v1/chat/completions"
    payload = json.dumps({
        "model":       "gpt-4o-mini",
        "messages":    [{"role": "user", "content": prompt}],
        "max_tokens":  1024,
        "temperature": 0.3,
    }).encode()
    req = urllib.request.Request(url, data=payload, headers={
        "Content-Type":  "application/json",
        "Authorization": f"Bearer {key}",
    })
    with urllib.request.urlopen(req, timeout=30) as res:
        data = json.loads(res.read())
    return data["choices"][0]["message"]["content"].strip()


def call_gemini(prompt: str, key: str) -> str:
    model = "gemini-2.0-flash"
    url   = (
        "https://generativelanguage.googleapis.com/v1beta"
        f"/models/{model}:generateContent?key={key}"
    )
    payload = json.dumps({
        "contents":         [{"parts": [{"text": prompt}]}],
        "generationConfig": {"temperature": 0.3, "maxOutputTokens": 1024},
    }).encode()
    req = urllib.request.Request(url, data=payload, headers={
        "Content-Type": "application/json",
    })
    with urllib.request.urlopen(req, timeout=30) as res:
        data = json.loads(res.read())
    return data["candidates"][0]["content"]["parts"][0]["text"].strip()


try:
    print(f"Provider: {provider}", flush=True)
    summary = call_openai(PROMPT, api_key) if provider == "openai" else call_gemini(PROMPT, api_key)
except urllib.error.HTTPError as e:
    body = e.read().decode()
    print(f"API Error {e.code}: {body}", flush=True)
    sys.exit(1)

# ── 최종 릴리즈 블록 (날짜 + AI 요약 + 구분선) ──────────────
date_str = datetime.now(timezone.utc).strftime("%Y-%m-%d")
block    = f"## {tag} ({date_str})\n\n{summary}\n\n---\n\n"

with open("/tmp/release_notes.md", "w", encoding="utf-8") as f:
    f.write(block)

print("=== Generated Release Notes ===")
print(block)
PYEOF

      # ── Step 6: README.md 주입 + 버전 배지 업데이트 ──────────
      - name: Inject notes and update version badge
        env:
          CURRENT_TAG: ${{ steps.tags.outputs.current_tag }}
        run: |
          python3 << 'PYEOF'
import os, re, sys

MARKER_START = "<!-- CHANGELOG_START -->"
MARKER_END   = "<!-- CHANGELOG_END -->"

tag     = os.environ["CURRENT_TAG"]          # e.g. "v1.3.0"
version = tag.lstrip("v")                    # e.g. "1.3.0"

with open("README.md", encoding="utf-8") as f:
    content = f.read()

# ① 플레이스홀더 존재 확인
missing = [m for m in (MARKER_START, MARKER_END) if m not in content]
if missing:
    print("ERROR: README.md에 아래 마커가 없습니다:")
    for m in missing:
        print(f"  {m}")
    sys.exit(1)

# ② 새 릴리즈 노트를 MARKER_START 바로 뒤에 최신순으로 누적 삽입
with open("/tmp/release_notes.md", encoding="utf-8") as f:
    new_notes = f.read()

insert_pos = content.index(MARKER_START) + len(MARKER_START)
end_pos    = content.index(MARKER_END)
old_logs   = content[insert_pos:end_pos]

content = (
    content[:insert_pos]
    + "\n"
    + new_notes
    + old_logs.lstrip("\n")
    + content[end_pos:]
)

# ③ 버전 배지 치환
#    ![Version](https://img.shields.io/badge/version-X.Y.Z-COLOR)
content = re.sub(
    r"badge/version-\d+\.\d+\.\d+",
    f"badge/version-{version}",
    content,
)

# ④ HTML 주석 마커 치환
#    <!-- APP_VERSION: vX.Y.Z -->
content = re.sub(
    r"<!-- APP_VERSION: v\d+\.\d+\.\d+ -->",
    f"<!-- APP_VERSION: {tag} -->",
    content,
)

with open("README.md", "w", encoding="utf-8") as f:
    f.write(content)

print("README.md 업데이트 완료!")
PYEOF

      # ── Step 7: 변경된 README.md 커밋 & main에 푸시 ─────────
      #   [skip ci] 포함 → 이 커밋으로 워크플로우가 재트리거되지 않음
      - name: Commit and push README.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "변경 사항 없음 — 커밋 생략"
          else
            git commit -m "docs: update changelog for ${{ github.ref_name }} [skip ci]"
            git push origin main
          fi
